name: DS Intelligence

on:
  push:
    branches: [storybook, main]
  pull_request:
    branches: [storybook, main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect component relationships
        run: node scripts/auto-link.js
        continue-on-error: true

      - name: Check for antipatterns
        run: node scripts/auto-fix.js
        continue-on-error: true

      - name: Sync documentation
        run: node scripts/sync-skills.js
        continue-on-error: true

      - name: Generate LLMs docs
        run: npm run build:llms

      - name: Check documentation coverage
        id: coverage
        run: |
          echo "📊 Checking documentation coverage..."

          # Count components with JSDoc
          COMPONENTS=$(find src/components -name "*.tsx" ! -name "*.stories.tsx" | wc -l)
          echo "Total components: $COMPONENTS"

          # Count stories
          STORIES=$(find src/components -name "*.stories.tsx" | wc -l)
          echo "Stories: $STORIES"

          # Count skills
          SKILLS=$(find skills -name "*.md" | wc -l)
          echo "Skills: $SKILLS"

          # Calculate coverage
          STORY_COVERAGE=$(( STORIES * 100 / COMPONENTS ))
          echo "Storybook coverage: $STORY_COVERAGE%"

          # Save metrics
          echo "COMPONENTS=$COMPONENTS" >> $GITHUB_OUTPUT
          echo "STORIES=$STORIES" >> $GITHUB_OUTPUT
          echo "STORY_COVERAGE=$STORY_COVERAGE" >> $GITHUB_OUTPUT

      - name: Detect gaps
        id: gaps
        run: |
          echo "🔍 Analyzing for gaps..."

          GAPS=0

          # Missing stories
          echo "## Gap Analysis Report" > gap-report.md

          for file in src/components/shadcn/*.tsx; do
            COMPONENT=$(basename "$file" .tsx)
            STORY="src/components/shadcn/$COMPONENT.stories.tsx"

            if [ ! -f "$STORY" ]; then
              echo "- ❌ $COMPONENT: Missing story" >> gap-report.md
              GAPS=$((GAPS + 1))
            else
              echo "- ✅ $COMPONENT: Has story" >> gap-report.md
            fi
          done

          echo "" >> gap-report.md
          echo "**Total gaps found:** $GAPS" >> gap-report.md

          echo "GAPS=$GAPS" >> $GITHUB_OUTPUT

          cat gap-report.md

      - name: Generate roadmap
        id: roadmap
        run: |
          echo "📋 Generating roadmap suggestions..."

          cat > roadmap-suggestions.md << 'EOF'
          # DS-OneBox Roadmap Suggestions

          Generated by DS Intelligence on $(date)

          ## High Priority

          ### Missing Documentation
          <!-- Auto-generated based on gap analysis -->

          ### Known Workarounds
          <!-- Auto-generated from TROUBLESHOOTING.md -->

          ## Medium Priority

          ### New Capabilities
          <!-- Auto-generated based on usage patterns -->

          ## Low Priority

          ### Experimental Features
          <!-- Auto-generated from Tier 3 components -->

          EOF

          cat roadmap-suggestions.md

      - name: Update usage telemetry
        run: |
          echo "📊 Updating usage telemetry..."

          # Update USAGE_TELEMETRY.json
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('USAGE_TELEMETRY.json', 'utf8'));

            // Count components
            const shadcn = fs.readdirSync('src/components/shadcn').filter(f => f.endsWith('.tsx') && !f.endsWith('.stories.tsx'));
            const blocks = fs.existsSync('src/components/blocks')
              ? fs.readdirSync('src/components/blocks').filter(f => f.endsWith('.tsx'))
              : [];

            data.usage.totalComponents = shadcn.length;
            data.health.avgDocumentationCoverage = ${{ steps.coverage.outputs.STORY_COVERAGE }};
            data.health.lastAudit = new Date().toISOString();

            fs.writeFileSync('USAGE_TELEMETRY.json', JSON.stringify(data, null, 2));
            console.log('✅ USAGE_TELEMETRY.json updated');
          "

      - name: Create improvement PR
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ds): DS intelligence improvements $(date)"
          title: "🤖 DS Intelligence: Automated Improvements"
          body: |
            ## DS OneBox Intelligence Report

            ### Coverage
            - Components: ${{ steps.coverage.outputs.COMPONENTS }}
            - Stories: ${{ steps.coverage.outputs.STORIES }}
            - Coverage: ${{ steps.coverage.outputs.STORY_COVERAGE }}%

            ### Gaps Found: ${{ steps.gaps.outputs.GAPS }}

            Changes made:
            - Component relationships updated
            - Documentation synced
            - LLMs docs regenerated
            - Usage telemetry updated

          branch: chore/ds-intelligence-${{ github.run_number }}
          delete-branch: true

      - name: Post summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════"
          echo "        DS Intelligence Report"
          echo "═══════════════════════════════════════════"
          echo "📦 Components: ${{ steps.coverage.outputs.COMPONENTS }}"
          echo "📖 Stories: ${{ steps.coverage.outputs.STORIES }}"
          echo "📊 Coverage: ${{ steps.coverage.outputs.STORY_COVERAGE }}%"
          echo "🔍 Gaps: ${{ steps.gaps.outputs.GAPS }}"
          echo "═══════════════════════════════════════════"
