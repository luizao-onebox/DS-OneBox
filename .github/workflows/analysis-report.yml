name: Commitar Relatórios de Análise

on:
  # Roda quando um relatório de análise é gerado localmente e commitado
  push:
    branches: [main]
    paths:
      - 'Workflow/Agent-Memory/analysis_*.md'

permissions:
  issues: write
  contents: read

jobs:
  open-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Criar issues para novos relatórios
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const changed = execSync('git diff --name-only HEAD~1 HEAD -- "Workflow/Agent-Memory/analysis_*.md"')
              .toString().trim().split('\n').filter(Boolean);

            const fs = require('fs');
            for (const file of changed) {
              const content = fs.readFileSync(file, 'utf8');
              const titleMatch = content.match(/^# Análise — (.+)$/m);
              const frameMatch = content.match(/FRAME_ID:\s*([\d:]+)/);
              if (!titleMatch) continue;

              const title = `🔍 ${titleMatch[1]} — problemas encontrados`;
              const frameId = frameMatch ? frameMatch[1] : 'desconhecido';

              // Extrair seção de correções
              const fixSection = content.match(/## Correções para o agente([\s\S]*?)(?=##|$)/);
              const fixes = fixSection ? fixSection[1].trim() : '(ver relatório completo)';

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  `Relatório gerado pelo agente: \`${file}\``,
                  `Frame ID: \`${frameId}\``,
                  '',
                  '### Correções identificadas',
                  fixes,
                  '',
                  '### Para aplicar:',
                  '```',
                  'python agent.py',
                  '# depois: "aplica as correções"',
                  '```',
                  '',
                  `*Gerado automaticamente pelo workflow \`analysis-report.yml\`*`
                ].join('\n'),
                labels: ['analysis', 'fix-needed']
              });
            }
